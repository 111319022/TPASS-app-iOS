<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>找不到頁面 | 404</title>
  <style>
    /* 引入 Google 字體：內文使用 Noto Sans，404 數字使用科技感的 Space Mono */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@700&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Noto Sans TC', sans-serif;
      /* 深邃的宇宙暗色背景，加入非常微弱的角落光源 */
      background-color: #0f172a; 
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(167, 139, 250, 0.05), transparent 25%);
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 10;
    }

    .error-code {
      font-family: 'Space Mono', monospace;
      font-size: 8rem;
      margin: 0;
      color: #e2e8f0;
      letter-spacing: -5px;
      /* 乾淨的微光陰影，取代生硬的毛玻璃 */
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
    }

    .error-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 10px 0 20px;
      color: #cbd5e1;
      letter-spacing: 1px;
    }

    .error-desc {
      font-size: 1.1rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 40px;
      max-width: 450px;
      margin-left: auto;
      margin-right: auto;
    }

    /* 極簡風幽靈按鈕 */
    .btn-home {
      display: inline-block;
      padding: 12px 36px;
      background-color: transparent;
      color: #38bdf8;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 500;
      font-size: 1rem;
      transition: all 0.3s ease;
      border: 1px solid rgba(56, 189, 248, 0.4);
    }

    .btn-home:hover {
      background-color: rgba(56, 189, 248, 0.1);
      border-color: #38bdf8;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
      transform: translateY(-2px);
    }

    /* 純 CSS 星空背景裝飾 */
    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0.3;
      animation: twinkle 3s infinite ease-in-out alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.1; transform: scale(0.8); box-shadow: 0 0 0 rgba(255,255,255,0); }
      100% { opacity: 0.8; transform: scale(1.2); box-shadow: 0 0 6px rgba(255,255,255,0.4); }
    }

    /* 手機版響應式設計 */
    @media (max-width: 600px) {
      .error-code { font-size: 6rem; }
      .error-title { font-size: 1.4rem; }
      .error-desc { font-size: 1rem; padding: 0 15px; }
    }
  </style>
</head>
<body>
  <div class="stars">
    <div class="star" style="top: 20%; left: 15%; width: 3px; height: 3px; animation-delay: 0s;"></div>
    <div class="star" style="top: 65%; left: 85%; width: 4px; height: 4px; animation-delay: 1.2s;"></div>
    <div class="star" style="top: 80%; left: 25%; width: 2px; height: 2px; animation-delay: 2.5s;"></div>
    <div class="star" style="top: 35%; left: 75%; width: 3px; height: 3px; animation-delay: 0.5s;"></div>
    <div class="star" style="top: 15%; left: 60%; width: 2.5px; height: 2.5px; animation-delay: 1.8s;"></div>
  </div>

  <div class="container">
    <h1 class="error-code">404</h1>
    <h2 class="error-title">連線中斷：找不到目標</h2>
    <p class="error-desc">你似乎偏離了航道，這片網路宇宙中沒有你要找的頁面。<br>請確認網址是否正確，或返回首頁。</p>
    <a href="/" class="btn-home">返回首頁</a>
  </div>
</body>
</html>
