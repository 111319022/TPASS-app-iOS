name: Build iOS App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest # 注意：iOS 建置一定要用 macos 環境

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode.app

    - name: Build App
      # 這裡是最關鍵的修改，使用 xcodebuild 而不是 swift build
      # 請將 "YourProjectName" 換成你實際的專案名稱 (不含 .xcodeproj)
      run: |
        xcodebuild clean build \
          -project TPASS.calc.xcodeproj \
          -scheme TPASS.calc \
          -sdk iphonesimulator \
          -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
